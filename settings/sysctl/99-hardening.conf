# Restrict kernel pointer exposure to all users
kernel.kptr_restrict = 2

# Restrict dmesg access to root
kernel.dmesg_restrict = 1

# Restrict perf events to root
kernel.perf_event_paranoid = 3

# Disable Magic SysRq key
kernel.sysrq = 0

# Disable unprivileged BPF
kernel.unprivileged_bpf_disabled = 1

# Disable kexec (prevent runtime kernel replacement)
kernel.kexec_load_disabled = 1

# Disable io_uring (significant attack surface)
# https://security.googleblog.com/2023/06/learnings-from-kctf-vrps-42-linux.html
kernel.io_uring_disabled = 2

# Disable core dumps via core_pattern
# https://wiki.archlinux.org/title/Core_dump#Using_sysctl
kernel.core_pattern = |/bin/false

# Prevent core dumps for suid binaries
fs.suid_dumpable = 0

# Disable TTY line discipline autoload
dev.tty.ldisc_autoload = 0

# Restrict userfaultfd to privileged users
vm.unprivileged_userfaultfd = 0

# Improve ASLR effectiveness for mmap
vm.mmap_rnd_bits = 32
vm.mmap_rnd_compat_bits = 16

# Suppress kernel info leaks at boot console
kernel.printk = 3 3 3 3

# Protect regular files and FIFOs in world-writable sticky directories
fs.protected_regular = 2
fs.protected_fifos = 2

# Hardlink and symlink protection
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# Limit oopses and warnings before panic
kernel.oops_limit = 100
kernel.warn_limit = 100

# Never auto-reboot after kernel panic
kernel.panic = -1
